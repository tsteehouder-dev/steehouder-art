<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Tekeningen</title>
<link rel="stylesheet" href="../css/style.css">


</head>

<body>
<div class="container">
    <h1>Tekeningen</h1>
    <p>Klik op een thumbnail om de tekening te vergroten, klik opnieuw om terug te keren.</p>

    <div class="gallery"></div>

    <div id="overlay">
        <img id="bigimg" src="">
    </div>
</div>

<script>
    const gallery = document.querySelector('.gallery');

    // Beschrijvingen per object (pas aan zoals jij wilt)
    const captions = {
"020": "020 - Max",
"021": "021 - Zelfportret met lichte beschadiging",
"022": "022 - Boefje",
"023": "022 - Meisje",
"024": "024 - Naakt",
"025": "025 - Kaj",
"026": "026 - Appels en potlood",
"041": "041 - Meisje",
"043": "043 - Boefje met balletje",
"052": "052 - Roger",
"062": "062 - Baarle-Hertog",
"238": "238 - Ezel",
"239": "239 - Man",
"240": "240 - Man met bierbekerte",
"241": "241 - Meisje", 
"242": "242 - Naakt",
"243": "243 - Boze man",
"244": "244 - Boze man 2",
"245": "245 - Koos",
"246": "246 - Naakt",
"247": "247 - Staf", 
"248": "248 - Herengracht 330-336 (1967)",
"249": "249 - Naakt", 
"250": "250 - Tosca",
"251": "251 - Francien",
"252": "252 - Scarlett",
"253": "253 - Leo",
"254": "254 - Georgette",
"255": "255 - naar Giovanni Giani",
"256": "256 - liggend naakt"
};   // ← dit is de enige juiste afsluiting

// voeg hier jouw eigen beschrijvingen toe


  
    for (let i = 1; i <= 999; i++) {
        const num = String(i).padStart(3, '0');
        const filename = `object${num}.jpg`;

        const img = new Image();
        img.src = filename;

        img.onload = () => {
            const item = document.createElement('div');
            item.className = 'gallery-item';


            const thumb = document.createElement('img');
            thumb.src = filename;
            thumb.className = 'thumb';

            const caption = document.createElement('div');
            caption.className = 'caption';
            caption.textContent = captions[num] || `object${num}`;

            thumb.onclick = () => {
                document.getElementById('bigimg').src = filename;
                document.getElementById('overlay').style.display = 'flex';
            };

            item.appendChild(thumb);
            item.appendChild(caption);
            gallery.appendChild(item);
        };
    }

    // Overlay sluiten
    const overlay = document.getElementById('overlay');
    overlay.onclick = () => overlay.style.display = 'none';

    // ESC sluit ook
    document.onkeydown = (e) => {
        if (e.key === "Escape") overlay.style.display = 'none';
    };
</script>

</body>
</html>
