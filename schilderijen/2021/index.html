<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Schilderijen uit 2021</title>
<link rel="stylesheet" href="../../css/style.css">


</head>

<body>
<div class="container">
    <h1>Schilderijen uit 2021</h1>
    <p>Klik op een thumbnail om de afbeelding te vergroten, klik opnieuw om terug te keren.</p>

    <div class="gallery"></div>

    <div id="overlay">
        <img id="bigimg" src="">
    </div>
</div>

<script>
    const gallery = document.querySelector('.gallery');

    // Beschrijvingen per object (pas aan zoals jij wilt)
    const captions = {
"139": "60x50 cm - 139 - Jean, olieverf op paneel, verkocht",
"140": "60x50 cm - 140 - Moeder en kind, olieverf op paneel",
"141": "60x50 cm - 141 - Vriendinnen, olieverf op paneel, verkocht",
"142": "60x50 cm - 142 - Jean bij zonsondergang, olieverf op paneel, verkocht",
"143": "60x50 cm - 143 - Scarlett 1, olieverf op paneel, verkocht", 
"144": "53x30 cm - 144 - Venus im Pelz, olieverf op paneel, verkocht",
"145": "60x50 cm - 145 - Torrent, olieverf op paneel, verkocht",
"146": "60x50 cm - 146 - Scarlett 2, olieverf op paneel, verkocht",
"147": "60x50 cm - 147 - Suzanne, olieverf op paneel, verkocht",
"148": "60x50 cm - 148 - Aronskelk, olieverf op paneel, verkocht",
"149": "60x50 cm - 149 - Eva / Almost Green, olieverf op paneel, verkocht",
"150": "60x50 cm - 150 - Scarlett 3, olieverf op paneel",
"151": "60x50 cm - 152 - Scarlett 4, olieverf op paneel, verkocht",
"152": "60x50 cm - 152 - Suzanne 2, olieverf op paneel, verkocht",
"153": "60x50 cm - 153 - Venus Weldensis, olieverf op paneel, verkocht",
"154": "60x50 cm - 154 - Anne, olieverf op paneel, verkocht",
"155": "60x50 cm - 155 - Marilyn, olieverf op paneel, verkocht",
"156": "60x50 cm - 156 - Tamara, olieverf op paneel, verkocht",
"157": "30x40 cm - 157 - Inna at the seaside, olieverf op paneel, verkocht",
"158": "60x50 cm - 158 - Debbie, olieverf op paneel, verkocht",
"159": "60x50 cm - 159 - De rode jurk, olieverf op paneel, verkocht",
"160": "60x50 cm - 160 - Figures in a landscape, olieverf op paneel, verkocht",
"161": "34x50 cm - 161 - Roos, olieverf op paneel",
"162": "25x30 cm - 162 - Weldse Ghoul, olieverf op canvas",
"163": "70x50 cm - 163 - Rode elastiekjes, olieverf op paneel, verkocht",
"164": "30x40 cm - 164 - Sofia 2, olieverf op paneel, verkocht",
"165": "60x40 cm - 165 - Stadsgezicht, olieverf op paneel",
"166": "60x40 cm - 166 - Anita, olieverf op paneel, verkocht"

        // voeg hier jouw eigen beschrijvingen toe
    };

    for (let i = 1; i <= 999; i++) {
        const num = String(i).padStart(3, '0');
        const filename = `object${num}.jpg`;

        const img = new Image();
        img.src = filename;

        img.onload = () => {
            const item = document.createElement('div');
            item.className = 'gallery-item';


            const thumb = document.createElement('img');
            thumb.src = filename;
            thumb.className = 'thumb';

            const caption = document.createElement('div');
            caption.className = 'caption';
            caption.textContent = captions[num] || `object${num}`;

            thumb.onclick = () => {
                document.getElementById('bigimg').src = filename;
                document.getElementById('overlay').style.display = 'flex';
            };

            item.appendChild(thumb);
            item.appendChild(caption);
            gallery.appendChild(item);
        };
    }

    // Overlay sluiten
    const overlay = document.getElementById('overlay');
    overlay.onclick = () => overlay.style.display = 'none';

    // ESC sluit ook
    document.onkeydown = (e) => {
        if (e.key === "Escape") overlay.style.display = 'none';
    };
</script>

</body>
</html>
