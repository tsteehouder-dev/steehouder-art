<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Schilderijen uit 2022</title>
<link rel="stylesheet" href="../../css/style.css">


</head>

<body>
<div class="container">
    <h1>Schilderijen uit 2022</h1>
    <p>Klik op een thumbnail om de afbeelding te vergroten, klik opnieuw om terug te keren.</p>

    <div class="gallery"></div>

    <div id="overlay">
        <img id="bigimg" src="">
    </div>
</div>

<script>
    const gallery = document.querySelector('.gallery');

    // Beschrijvingen per object (pas aan zoals jij wilt)
    const captions = {
"167": "70x50 cm - 167 - Anachronisme, olieverf op paneel, verkocht",
"168": "70x50 cm - 168 - Herinnering 1, olieverf op paneel",
"169": "70x50 cm - 169 - Sssst!, olieverf op paneel, verkocht",
"170": "60x40 cm - 170 - Anya 1, olieverf op paneel, verkocht",
"171": "35x50 cm - 171 - Stilleven met glazen, olieverf op paneel",
"172": "70x50 cm - 172 - Venus met pauw, olieverf op paneel",
"173": "70x50 cm - 173 - Billy Burke, olieverf op paneel",
"174": "70x50 cm - 174 - IJskoningin, olieverf op paneel, verkocht",
"175": "70x50 cm - 175 - Anya gekleed als paus, olieverf op paneel, verkocht",
"176": "10x10 cm - 176 - Tijd, olieverf op koper, verkocht",
"177": "17x17 cm - 177 - Scarlett, olieverf op koper, verkocht",
"178": "70x50 cm - 178 - Man, olieverf op paneel",
"179": "70x50 cm - 179 - Naakt, olieverf op paneel",
"180": "15x10 cm - 180 - Hooiveld, olieverf op papier, verkocht",
"183": "15x10 cm - 183 - Landschap, aquarel, gevernist",
"184": "70x50 cm - 184 - Portret van John, olieverf op paneel",
"185": "22x29 cm - 185 - Portret van een meisje door Petrus Christus (1480), kopie, , olieverf op paneel",
"186": "70x50 cm - 186 - Annunciatie, olieverf op paneel, verkocht",
"187": "30x40 cm - 187 - Vrouw in groene jurk, olieverf op linnen",
"188": "50x34 cm - 188 - Weiland met hooibalen, olieverf op paneel",
"189": "60x50 cm - 189 - Liggend naakt, olieverf op paneel",
"190": "70x50 cm - 190 - Anya in rode jruk, olieverf op paneel, verkocht",
"191": "70x50 cm - 191 - Naakt nr. 3 , olieverf op paneel, verkocht",
"192": "70x50 cm - 192 - Anya op de uitkijk, olieverf op paneel",
"193": "70x50 cm - 193 - Meisje met een paarlen oorbel en Poppy zelf, olieverf op paneel, verkocht",
"194": "70x50 cm - 194 - Uitzicht, olieverf op paneel, verkocht",
"195": "35x50 cm - 195 - Geliefde met gele schoenen, olieverf op paneel",
"196": "24x30 cm - 196 - Geliefde met witte jurk, olieverf op canvas"
        // voeg hier jouw eigen beschrijvingen toe
    };

    for (let i = 1; i <= 999; i++) {
        const num = String(i).padStart(3, '0');
        const filename = `object${num}.jpg`;

        const img = new Image();
        img.src = filename;

        img.onload = () => {
            const item = document.createElement('div');
            item.className = 'gallery-item';


            const thumb = document.createElement('img');
            thumb.src = filename;
            thumb.className = 'thumb';

            const caption = document.createElement('div');
            caption.className = 'caption';
            caption.textContent = captions[num] || `object${num}`;

            thumb.onclick = () => {
                document.getElementById('bigimg').src = filename;
                document.getElementById('overlay').style.display = 'flex';
            };

            item.appendChild(thumb);
            item.appendChild(caption);
            gallery.appendChild(item);
        };
    }

    // Overlay sluiten
    const overlay = document.getElementById('overlay');
    overlay.onclick = () => overlay.style.display = 'none';

    // ESC sluit ook
    document.onkeydown = (e) => {
        if (e.key === "Escape") overlay.style.display = 'none';
    };
</script>

</body>
</html>
