<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Schilderijen uit 2023</title>
<link rel="stylesheet" href="../../css/style.css">


</head>

<body>
<div class="container">
    <h1>Schilderijen uit 2023</h1>
    <p>Klik op een thumbnail om de afbeelding te vergroten, klik opnieuw om terug te keren.</p>

    <div class="gallery"></div>

    <div id="overlay">
        <img id="bigimg" src="">
    </div>
</div>

<script>
    const gallery = document.querySelector('.gallery');

    // Beschrijvingen per object (pas aan zoals jij wilt)
    const captions = {
"197": "40x50 cm - 197 - Geliefden-elke dag feest, olieverf op paneel",
"198": "70x50 cm - 198 - Verschijning, olieverf op paneel",
"199": "24x30 cm - 199 - De Geliefden, olieverf op paneel",
"200": "70x50 cm - 200 - Boezem, olieverf op paneel, verkocht",
"201": "70x50 cm - 201 - Eerbetoon, olieverf op paneel",
"202": "60x60 cm - 202 - Vrouw met hond, olieverf op paneel",
"203": "70x50 cm - 203 - Zelfportret met onverwachte verschijning, olieverf op paneel",
"204": "70x50 cm - 204 - Zomer, olieverf op paneel",
"205": "80x60 cm - 205 - Zomer 2, olieverf op doek",
"206": "70x50 cm - 206 - Herinnering, olieverf op paneel",
"207": "24x34 cm - 207 - De verrassing, olieverf op paneel",
"208": "70x50 cm - 208 - Rokers, olieverf op paneel",
"209": "70x50 cm - 209 - The Male Gaze, olieverf op paneel",
"210": "70x50 cm - 210 - Haagwinde, olieverf op paneel, verkocht",
"211": "70x50 cm - 211 - Inna met uitzicht, olieverf op paneel, verkocht",
"212": "40x50 cm - 212 - Hand, olieverf op paneel",
"213": "70x50 cm - 213 - La Vigne / the Vine, olieverf op vinyl",
"214": "70x50 cm - 214 - De geboorte van Venus, olieverf op paneel, verkocht",
"215": "40x50 cm - 215 - Oleander, olieverf op paneel, verkocht",
"216": "70x50 cm - 216 - Crisis, olieverf op paneel",
"217": "70x50 cm - 217 - Reconstructie, olieverf op paneel",
"218": "30x40 cm - 218 - Fuse, olieverf op linnen",
"219": "70x50 cm - 219 - Onderweg, olieverf op vinyl",
"220": "70x50 cm - 220 - De weduwnaar,olieverf op vinyl"
        // voeg hier jouw eigen beschrijvingen toe
    };

    for (let i = 1; i <= 999; i++) {
        const num = String(i).padStart(3, '0');
        const filename = `object${num}.jpg`;

        const img = new Image();
        img.src = filename;

        img.onload = () => {
            const item = document.createElement('div');
            item.className = 'gallery-item';


            const thumb = document.createElement('img');
            thumb.src = filename;
            thumb.className = 'thumb';

            const caption = document.createElement('div');
            caption.className = 'caption';
            caption.textContent = captions[num] || `object${num}`;

            thumb.onclick = () => {
                document.getElementById('bigimg').src = filename;
                document.getElementById('overlay').style.display = 'flex';
            };

            item.appendChild(thumb);
            item.appendChild(caption);
            gallery.appendChild(item);
        };
    }

    // Overlay sluiten
    const overlay = document.getElementById('overlay');
    overlay.onclick = () => overlay.style.display = 'none';

    // ESC sluit ook
    document.onkeydown = (e) => {
        if (e.key === "Escape") overlay.style.display = 'none';
    };
</script>

</body>
</html>
