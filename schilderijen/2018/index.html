<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Schilderijen uit 2018</title>
<link rel="stylesheet" href="../../css/style.css">


</head>

<body>
<div class="container">
    <h1>Schilderijen uit 2018</h1>
    <p>Klik op een thumbnail om de afbeelding te vergroten, klik opnieuw om terug te keren.</p>

    <div class="gallery"></div>

    <div id="overlay">
        <img id="bigimg" src="">
    </div>
</div>

<script>
    const gallery = document.querySelector('.gallery');

    // Beschrijvingen per object (pas aan zoals jij wilt)
    const captions = {

"081": "40x50 cm - 081 Abdel, olieverf op linnen",
"082": "40x60 cm - 082 Halfnaakt met shawl, olieverf op paneel, verkocht",
"083": "24-29 cm - 083 Sproeten, olieverf op eiken paneel, verkocht",
"084": "60x60 cm - 084 Cultura, olieverf op paneel, verkocht",
"085": "60x60 cm - 085 Primavera, olieverf op paneel, verkocht",
"086": "60x80 cm - 086 Leaving on a jetplane, olieverf op doek, verkocht",
"087": "60x60 cm - 087 Hongaarse Melodie (Dora Delyiska), olieverf op paneel, verkocht",
"088": "60x60 cm - 088 Lily, olieverf op paneel, verkocht",
"089": "60c60 cm - 089 Yana, olieverf op paneel, verkocht",
"090": "70x43,5 cm - 090 Financial Times, olieverf op paneel, verkocht",
"091": "60x50 cm - 091 Groda Kraft, olieverf op paneel, verkocht",
"092": "60x60 cm - 092 Smoke screen, olieverf op paneel, verkocht",
"093": "80x60 cm - 093 Chantelle, olieverf op paneel, verkocht",
"094": "60x60 cm - 094 May, olieverf op paneel, verkocht",
"095": "60x60 cm - 095 Modesty, olieverf op paneel, verkocht",
"096": "70x100 cm - 096 Ditta, olieverf op paneel, verkocht"
};   // ← dit is de enige juiste afsluiting

// voeg hier jouw eigen beschrijvingen toe


  
    for (let i = 1; i <= 999; i++) {
        const num = String(i).padStart(3, '0');
        const filename = `object${num}.jpg`;

        const img = new Image();
        img.src = filename;

        img.onload = () => {
            const item = document.createElement('div');
            item.className = 'gallery-item';


            const thumb = document.createElement('img');
            thumb.src = filename;
            thumb.className = 'thumb';

            const caption = document.createElement('div');
            caption.className = 'caption';
            caption.textContent = captions[num] || `object${num}`;

            thumb.onclick = () => {
                document.getElementById('bigimg').src = filename;
                document.getElementById('overlay').style.display = 'flex';
            };

            item.appendChild(thumb);
            item.appendChild(caption);
            gallery.appendChild(item);
        };
    }

    // Overlay sluiten
    const overlay = document.getElementById('overlay');
    overlay.onclick = () => overlay.style.display = 'none';

    // ESC sluit ook
    document.onkeydown = (e) => {
        if (e.key === "Escape") overlay.style.display = 'none';
    };
</script>

</body>
</html>
