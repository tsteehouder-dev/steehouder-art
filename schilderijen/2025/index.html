<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Schilderijen uit 2025</title>
<link rel="stylesheet" href="../../css/style.css">


</head>

<body>
<div class="container">
    <h1>Schilderijen uit 2025</h1>
    <p>Klik op een thumbnail om de afbeelding te vergroten, klik opnieuw om terug te keren.</p>

    <div class="gallery"></div>

    <div id="overlay">
        <img id="bigimg" src="">
    </div>
</div>

<script>
    const gallery = document.querySelector('.gallery');

    // Beschrijvingen per object (pas aan zoals jij wilt)
    const captions = {
"225": "100x40 cm - 225 - Paradijs, olieverf op doek",
"226": "70x50 cm - 226 - Portret van Trudy op 17-jarige leeftijd, olieverf op paneel",
"227": "60x60 cm - 227 - Interessante Tijden, olieverf op doek",
"228": "70x50 cm - 228 - Betrapt!, olieverf op paneel",
"229": "70x50 cm - 229 - Inna, olieverf op paneel",
"230": "70x50 cm - 230 - De kunstenaar en zijn Muzen, olieverf op paneel",
"231": "70x50 cm - 231 - Adrianna met rode bh, olieverf op paneel", 
"232": "70x50 cm - 232 - Kijk, daar heb je niet van terug!, olieverf op paneel",
"233": "50x40 cm - 233 - Anna, olieverf op doek",
"234": "40x50 cm - 234 - Anna 2, olieverf op vinyl"
        // voeg hier jouw eigen beschrijvingen toe
    };

    for (let i = 1; i <= 999; i++) {
        const num = String(i).padStart(3, '0');
        const filename = `object${num}.jpg`;

        const img = new Image();
        img.src = filename;

        img.onload = () => {
            const item = document.createElement('div');
            item.className = 'gallery-item';


            const thumb = document.createElement('img');
            thumb.src = filename;
            thumb.className = 'thumb';

            const caption = document.createElement('div');
            caption.className = 'caption';
            caption.textContent = captions[num] || `object${num}`;

            thumb.onclick = () => {
                document.getElementById('bigimg').src = filename;
                document.getElementById('overlay').style.display = 'flex';
            };

            item.appendChild(thumb);
            item.appendChild(caption);
            gallery.appendChild(item);
        };
    }

    // Overlay sluiten
    const overlay = document.getElementById('overlay');
    overlay.onclick = () => overlay.style.display = 'none';

    // ESC sluit ook
    document.onkeydown = (e) => {
        if (e.key === "Escape") overlay.style.display = 'none';
    };
</script>

</body>
</html>
